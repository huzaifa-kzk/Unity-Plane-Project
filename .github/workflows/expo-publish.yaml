name: Expo CI/CD

# Trigger workflow on push to main
on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true  # include submodules if any

      # 2️⃣ Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Cache node_modules for faster builds
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: plane-controller-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('plane-controller-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4️⃣ Install npm dependencies
      - name: Install dependencies
        working-directory: plane-controller-app
        run: npm ci  # safer than npm install in CI

      # 5️⃣ Install EAS CLI globally
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 6️⃣ Clear cache & start Metro bundler (fix asset issues)
      - name: Clear Metro & npm cache
        working-directory: plane-controller-app
        run: |
          npm cache clean --force
          rm -rf node_modules
          rm -rf .expo
          npm ci

      # 7️⃣ Optional: Run tests
      - name: Run tests
        working-directory: plane-controller-app
        run: npm test || echo "No tests found"

      # 8️⃣ Publish update via EAS Update
      - name: EAS Update
        working-directory: plane-controller-app
        run: |
          # Tell CI mode to avoid prompts
          CI=1 eas update --branch main --message "CI/CD update from GitHub Actions"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
