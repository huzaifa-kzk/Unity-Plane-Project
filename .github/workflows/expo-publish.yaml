name: Expo CI/CD

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: plane-controller-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('plane-controller-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: plane-controller-app
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run tests
        working-directory: plane-controller-app
        run: npm test || echo "No tests found"

      # 🔹 Export bundles before EAS Update
      - name: Export bundles
        working-directory: plane-controller-app
        env:
          CI: 1
          EXPO_NO_CACHE: 1
        run: npx expo export --output-dir dist --experimental-bundle

      # 🔹 EAS Update
      - name: EAS Update
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
          EXPO_NO_CACHE: 1
        run: eas update --branch main --message "CI/CD update from GitHub Actions"
