name: Expo EAS Update CI/CD

on:
  push:
    branches:
      - main

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Clear cache
        working-directory: plane-controller-app
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf dist

      - name: Install dependencies
        working-directory: plane-controller-app
        run: npm ci

      - name: Verify image imports are updated
        working-directory: plane-controller-app
        run: |
          # Check if any files still reference airplane.png
          if grep -r "airplane\.png" src/ app/ components/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "ERROR: Found references to airplane.png. Please update to airplane.jpg"
            echo "Files that need updating:"
            grep -r "airplane\.png" src/ app/ components/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" 2>/dev/null
            exit 1
          else
            echo "✓ All image references are updated to .jpg"
          fi

      - name: Publish update via EAS
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
        run: |
          eas update --branch main --message "CI/CD update from GitHub Actions"