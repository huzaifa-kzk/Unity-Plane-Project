name: Expo EAS Update CI/CD

on:
  push:
    branches:
      - main

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install image processing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file imagemagick libimage-exiftool-perl

      - name: Check and fix image files
        working-directory: plane-controller-app
        run: |
          echo "Checking for corrupt image files..."
          
          # Find and check all image files
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.webp" -o -name "*.bmp" \) | while read img; do
            echo "Checking: $img"
            
            # Check if file is valid
            if ! file "$img" | grep -q "image data"; then
              echo "⚠️  WARNING: $img may not be a valid image"
              file "$img"
            fi
            
            # Check file size (empty files cause issues)
            if [ ! -s "$img" ]; then
              echo "❌ ERROR: $img is empty (0 bytes)"
            fi
            
            # Try to identify the file
            identify "$img" 2>/dev/null || echo "ImageMagick cannot read: $img"
          done
          
          # Specifically check assets folder
          echo ""
          echo "Checking assets folder:"
          find assets -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec file {} \;

      - name: Install dependencies
        working-directory: plane-controller-app
        run: |
          npm ci
          
      - name: Clear cache
        working-directory: plane-controller-app
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf dist
          
      - name: Publish update via EAS
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: true
        run: |
          npx eas update --branch main --message "CI/CD update from GitHub Actions"