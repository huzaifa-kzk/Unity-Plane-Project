name: Expo CI/CD

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        working-directory: plane-controller-app
        run: npm install

      # Install EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # Publish OTA update
      - name: EAS Update
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch main --auto
