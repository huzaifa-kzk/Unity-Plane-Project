name: Expo EAS Update CI/CD

on:
  push:
    branches:
      - main

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: plane-controller-app/package-lock.json

      - name: Install dependencies
        working-directory: plane-controller-app
        run: |
          # Clean install
          npm ci
          
          # Install eas-cli explicitly
          npm install eas-cli@latest --save-dev
          
          # Verify installation
          npx eas --version || npm list eas-cli

      - name: Clear cache
        working-directory: plane-controller-app
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf dist

      - name: Run EAS Update
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: true
        run: |
          # Use the full path to eas command
          ./node_modules/.bin/eas update --branch main --message "CI/CD update from GitHub Actions"