name: Expo EAS Update CI/CD

on:
  push:
    branches:
      - main

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: plane-controller-app/package-lock.json

      - name: Install dependencies
        working-directory: plane-controller-app
        run: |
          npm ci
          # Install eas-cli locally in the project
          npm install eas-cli@latest

      - name: Clear cache
        working-directory: plane-controller-app
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf dist

      - name: Fix image file if needed
        working-directory: plane-controller-app
        run: |
          # Install tools to check file types
          sudo apt-get update
          sudo apt-get install -y file
          
          # Check airplane image file type
          if [ -f "assets/images/airplane.png" ]; then
            echo "Checking airplane.png..."
            file assets/images/airplane.png
          elif [ -f "assets/images/airplane.jpg" ]; then
            echo "Found airplane.jpg instead of airplane.png"
          fi

      - name: Publish update via EAS
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Use npx to run eas from local node_modules
          npx eas update --branch main --message "CI/CD update from GitHub Actions"