name: Expo EAS Update CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'plane-controller-app/app/**'    # Only trigger on app changes
      - 'plane-controller-app/src/**'    # Not on config files
      - 'plane-controller-app/assets/**'

jobs:
  eas-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          sparse-checkout: |           # Only checkut needed files
            plane-controller-app
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: plane-controller-app/package-lock.json

      - name: Install dependencies (cached)
        working-directory: plane-controller-app
        run: |
          # Only install if package-lock changed
          npm ci --prefer-offline --no-audit

      - name: Publish EAS Update
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: true
        run: |
          npx expo export --platform all --non-interactive
          npx eas update --branch main --message "${{ github.event.head_commit.message || 'CI/CD update' }}" --non-interactive