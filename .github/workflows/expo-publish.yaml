name: Expo CI/CD

# Trigger workflow on push to main
on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Cache node_modules for faster builds
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: plane-controller-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('plane-controller-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4️⃣ Install npm dependencies
      - name: Install dependencies
        working-directory: plane-controller-app
        run: npm install

      # 5️⃣ Install EAS CLI globally
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 6️⃣ Run tests (optional)
      - name: Run tests
        working-directory: plane-controller-app
        run: npm test || echo "No tests found"

      # 7️⃣ Export static bundles for all platforms
      - name: Export bundles
        working-directory: plane-controller-app
        env:
          CI: 1
          EXPO_NO_CACHE: 1
        run: npx expo export --output-dir dist --experimental-bundle

      # 8️⃣ Publish update via EAS Update
      - name: EAS Update
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
          EXPO_NO_CACHE: 1
        run: eas update --branch main --message "CI/CD update from GitHub Actions"
