name: Expo EAS Update CI/CD

on:
  push:
    branches:
      - main

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js and cache dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: plane-controller-app/package-lock.json

      # 3️⃣ Clean install dependencies
      - name: Clean install dependencies
        working-directory: plane-controller-app
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install -g eas-cli@latest
          npm install eas-cli@latest --save-dev

      # 4️⃣ Clear cache
      - name: Clear cache
        working-directory: plane-controller-app
        run: |
          rm -rf node_modules/.cache
          rm -rf .expo
          rm -rf dist
          rm -rf .metro

      # 5️⃣ Run EAS Update
      - name: Run EAS Update
        working-directory: plane-controller-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: true
        run: |
          eas update --branch main --message "CI/CD update from GitHub Actions"
